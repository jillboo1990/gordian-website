<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品详情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000;
      --white: #fff;
      --gray-dark: #4a4a4a;
      --gray-mid: #9e9e9e;
      --gray-light: #c9c9c9;
      --gray-lighter: #e6e6e6;
      --font-mono: 'Chivo', monospace, sans-serif;
    }

    body {
      font-family: var(--font-mono);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      line-height: 1.8;
    }

    /* Header */
    .detail-header {
      padding: 40px 180px;
      border-bottom: 1px solid var(--gray-lighter);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detail-header .back-link {
      font-size: 13px;
      color: var(--gray-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .detail-header .back-link:hover {
      color: var(--black);
    }

    .detail-header .work-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Hero banner */
    .detail-hero {
      width: 100%;
      aspect-ratio: 16 / 7;
      overflow: hidden;
      padding: 0 180px;
      margin: 0;
    }

    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Meta info */
    .detail-meta {
      padding: 32px 180px;
      display: flex;
      gap: 40px;
      border-bottom: 1px solid var(--gray-lighter);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .meta-label {
      color: var(--gray-mid);
      font-weight: 500;
    }

    .meta-value {
      color: var(--black);
      font-weight: 600;
    }

    /* Content */
    .detail-content {
      max-width: none;
      margin: 0;
      padding: 0 180px 120px;
    }

    /* Rich text styles */
    .detail-content > *:first-child { margin-top: 0; }
    .detail-content h1 { font-size: 28px; font-weight: 700; margin: 32px 0 16px; }
    .detail-content h2 { font-size: 22px; font-weight: 600; margin: 28px 0 14px; }
    .detail-content h3 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
    .detail-content p { margin: 12px 0; line-height: 1.9; color: var(--gray-dark); }
    .detail-content p:first-child { margin-top: 0; }
    .detail-content p:has(img) { margin: 0; padding: 0; line-height: 0; font-size: 0; }
    .detail-content p:has(video) { margin: 0; padding: 0; line-height: 0; font-size: 0; }
    .detail-content p:has(iframe) { margin: 0; padding: 0; line-height: 0; font-size: 0; }
    .detail-content p:empty { margin: 0; padding: 0; line-height: 0; font-size: 0; display: none; }
    .detail-content p br:only-child { display: none; }
    .detail-content img { width: 100%; border-radius: 0; margin: 0; padding: 0; display: block; }
    .detail-content video { width: 100%; border-radius: 0; margin: 0; padding: 0; display: block; }
    .detail-content iframe { width: 100%; margin: 0; padding: 0; display: block; }
    .detail-content blockquote {
      border-left: 3px solid var(--black);
      padding-left: 16px;
      margin: 20px 0;
      color: var(--gray-dark);
      font-style: italic;
    }
    .detail-content ul, .detail-content ol {
      padding-left: 24px;
      margin: 12px 0;
    }
    .detail-content li { margin: 6px 0; color: var(--gray-dark); }

    /* Table styles */
    .detail-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 13px;
    }
    .detail-content table th,
    .detail-content table td {
      border: 1px solid var(--gray-lighter);
      padding: 10px 14px;
      text-align: left;
    }
    .detail-content table th {
      background: #f8f8f8;
      font-weight: 600;
    }

    /* Collapsible sections */
    .collapse-section {
      border: 1px solid var(--gray-lighter);
      border-radius: 8px;
      margin: 20px 0;
      overflow: hidden;
    }

    .collapse-header {
      padding: 14px 18px;
      background: #f8f8f8;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 14px;
      user-select: none;
      transition: background 0.2s;
    }

    .collapse-header:hover {
      background: #f0f0f0;
    }

    .collapse-header::after {
      content: '▼';
      font-size: 10px;
      transition: transform 0.3s;
    }

    .collapse-section.collapsed .collapse-header::after {
      transform: rotate(-90deg);
    }

    .collapse-body {
      padding: 16px 18px;
      transition: max-height 0.3s ease;
      overflow: hidden;
    }

    .collapse-section.collapsed .collapse-body {
      max-height: 0 !important;
      padding: 0 18px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--gray-mid);
      display: none;
    }

    .empty-state.visible {
      display: block;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--gray-dark);
    }

    /* Skeleton loading */
    .skeleton {
      padding: 40px 0;
    }

    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .skeleton-line:nth-child(1) { width: 95%; }
    .skeleton-line:nth-child(2) { width: 80%; }
    .skeleton-line:nth-child(3) { width: 90%; }
    .skeleton-line:nth-child(4) { width: 70%; }
    .skeleton-line:nth-child(5) { width: 85%; }
    .skeleton-line:nth-child(6) { width: 60%; height: 200px; margin-top: 24px; }
    .skeleton-line:nth-child(7) { width: 88%; margin-top: 24px; }
    .skeleton-line:nth-child(8) { width: 75%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 768px) {
      .detail-header {
        padding: 20px 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .detail-header .work-title {
        width: 100%;
        text-align: center;
        font-size: 20px;
      }
      .detail-meta {
        padding: 20px 24px;
        flex-wrap: nowrap;
        gap: 0;
        justify-content: space-evenly;
        text-align: center;
      }
      .detail-meta .meta-item {
        align-items: center;
      }
      .detail-hero {
        padding: 0;
        aspect-ratio: auto;
        overflow: visible;
      }
      .detail-hero img {
        height: auto;
        object-fit: contain;
      }
      .detail-content { padding: 0; }
      .contact-brand { display: none; }
      .contact-section { min-height: auto; }
      .contact-info { padding: 20px 24px; gap: 12px; }
    }
  </style>
</head>
<body>
  <header class="detail-header">
    <a href="/" class="back-link">← 返回首页</a>
    <h1 class="work-title" id="workTitle"></h1>
  </header>

  <div class="detail-meta" id="detailMeta">
    <div class="meta-item">
      <span class="meta-label">标签</span>
      <span class="meta-value" id="metaTags"></span>
    </div>
    <div class="meta-item">
      <span class="meta-label">年份</span>
      <span class="meta-value" id="metaYear"></span>
    </div>
    <div class="meta-item">
      <span class="meta-label">分类</span>
      <span class="meta-value" id="metaCategory"></span>
    </div>
  </div>

  <div class="detail-hero" id="detailHero">
    <img id="heroImg" src="" alt="">
  </div>

  <div class="detail-content" id="detailContent">
    <div class="skeleton" id="skeletonLoading">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <h3>暂无详情内容</h3>
      <p>该作品尚未添加详细介绍</p>
    </div>
  </div>

  <!-- Footer -->
  <section class="contact-section">
    <div class="contact-brand">
      <div class="contact-top">
        <div class="contact-email-row">
          <h2 class="contact-email" id="footerEmail"></h2>
        </div>
      </div>
      <h1 class="giant-text visible" id="footerBrand"></h1>
    </div>
    <div class="contact-info">
      <div class="contact-info-item">
        <span class="info-label">WECHAT:</span>
        <div class="info-value" id="footerSocial"></div>
      </div>
      <div class="contact-info-item">
        <span class="info-label">PHONE:</span>
        <div class="info-value" id="footerPhone"></div>
      </div>
      <div class="contact-info-item">
        <span class="info-label">LOCATION:</span>
        <div class="info-value" id="footerLocation"></div>
      </div>
      <div class="contact-info-item">
        <span class="info-label">EXPERTISE:</span>
        <div class="info-value" id="footerExpertise"></div>
      </div>
    </div>
  </section>

  <script>
    const workId = window.location.pathname.split('/').pop();

    async function loadWork() {
      try {
        const res = await fetch(`/api/works/${workId}`);
        if (!res.ok) throw new Error('Not found');
        const work = await res.json();

        document.title = work.name + ' - 作品详情';
        document.getElementById('workTitle').textContent = work.name;
        document.getElementById('heroImg').src = work.image;
        document.getElementById('heroImg').alt = work.name;
        document.getElementById('metaTags').textContent = work.tags;
        document.getElementById('metaYear').textContent = work.year;
        document.getElementById('metaCategory').textContent = work.category;

        // Hide skeleton
        document.getElementById('skeletonLoading').style.display = 'none';

        if (work.detail && work.detail.trim()) {
          document.getElementById('detailContent').innerHTML = work.detail;
          // Ensure all videos are playable with controls
          document.querySelectorAll('.detail-content video').forEach(video => {
            video.setAttribute('controls', '');
            video.setAttribute('playsinline', '');
            video.setAttribute('preload', 'metadata');
            video.removeAttribute('autoplay');
            video.style.width = '100%';
            video.style.borderRadius = '0';
            video.style.display = 'block';
          });
          // Remove margins from p tags that contain only images/videos
          document.querySelectorAll('.detail-content p').forEach(p => {
            if (p.querySelector('img') || p.querySelector('video') || p.querySelector('iframe')) {
              p.style.margin = '0';
              p.style.padding = '0';
              p.style.lineHeight = '0';
              p.style.fontSize = '0';
            }
            // Hide empty p or p with only br
            if (!p.textContent.trim() && !p.querySelector('img') && !p.querySelector('video')) {
              p.style.display = 'none';
            }
          });
          initCollapsible();
        } else {
          // No detail content, show empty state
          document.getElementById('emptyState').classList.add('visible');
        }
      } catch (err) {
        console.error(err);
        document.getElementById('skeletonLoading').style.display = 'none';
        document.getElementById('emptyState').classList.add('visible');
      }
    }

    function initCollapsible() {
      document.querySelectorAll('.collapse-section').forEach(section => {
        section.classList.add('collapsed'); // 默认收起
      });
      document.querySelectorAll('.collapse-header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.parentElement;
          section.classList.toggle('collapsed');
        });
      });
    }

    async function loadFooter() {
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        const si = data.siteInfo;

        if (si) {
          document.getElementById('footerEmail').textContent = si.email || '';
          document.getElementById('footerBrand').textContent = si.brand || '';
          document.getElementById('footerSocial').innerHTML = `<span>${si.social?.wechat || ''}</span>`;
          document.getElementById('footerPhone').innerHTML = `<span>${si.phone || ''}</span>`;
          document.getElementById('footerLocation').innerHTML = `<span>${si.location || ''}</span>`;
          document.getElementById('footerExpertise').innerHTML = `<span>${(si.expertise || []).join(' / ')}</span>`;
        }
      } catch (err) {
        console.error('Failed to load footer:', err);
      }
    }

    loadWork();
    loadFooter();
  </script>
</body>
</html>
